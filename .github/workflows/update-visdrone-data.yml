name: Update VisDrone Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      update_stars:
        description: 'Update GitHub Stars'
        required: false
        default: true
        type: boolean
      update_news:
        description: 'Update News from aiskyeye.com'
        required: false
        default: false
        type: boolean

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
          
      - name: Update GitHub Stars
        if: ${{ github.event.inputs.update_stars != 'false' }}
        run: |
          echo "Updating GitHub Stars..."
          python scripts/update_github_stars.py
          
      - name: Update News
        if: ${{ github.event.inputs.update_news == 'true' }}
        run: |
          echo "Updating News..."
          python scripts/fetch_news.py
          
      - name: Update meta.json
        run: |
          python -c "
          import json
          from datetime import datetime
          with open('public/data/meta.json', 'r+') as f:
              data = json.load(f)
              data['lastUpdated'] = datetime.now().isoformat()
              f.seek(0)
              json.dump(data, f, indent=2)
              f.truncate()
          "
          
      - name: Check for changes
        id: check_changes
        run: |
          git add public/data/ src/data/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "chore: auto-update data [skip ci]"
          git push
          
      - name: Summary
        run: |
          echo "### Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Stars: ${{ github.event.inputs.update_stars != 'false' && 'Updated' || 'Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- News: ${{ github.event.inputs.update_news == 'true' && 'Updated' || 'Skipped' }}" >> $GITHUB_STEP_SUMMARY
